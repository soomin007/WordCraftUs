<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word, Craft, Us</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&family=Gaegu:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="config.js"></script>
<style>
  :root {
    --bg-base: #0D0D0D;
    --text-main: #F5F0E8;
    --text-dim: #8a847a;
    --mood-primary: #2C3E50;
    --mood-secondary: #ECF0F1;
    --font-body: 'Noto Sans KR', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg-base);
    color: var(--text-main);
    font-family: var(--font-body);
    overflow: hidden;
    transition: background 2s ease, font-family 1s ease;
  }
  body.with-mood {
    background: linear-gradient(to bottom, var(--bg-base), color-mix(in srgb, var(--mood-primary) 25%, var(--bg-base)));
  }
  .screen {
    position: fixed; inset: 0;
    display: none;
    opacity: 0;
    transition: opacity 0.6s ease;
    padding: 40px;
  }
  .screen.active { display: flex; opacity: 1; }
  .screen.center { align-items: center; justify-content: center; flex-direction: column; }

  h1.title {
    font-family: 'Playfair Display', 'Noto Serif KR', serif;
    font-size: 3.2rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin-bottom: 2.5rem;
    text-align: center;
  }
  h1.title .comma { color: var(--text-dim); }

  /* --- 시작 화면 --- */
  .start-form {
    display: flex; flex-direction: column; align-items: center;
    gap: 1rem; width: 100%; max-width: 420px;
  }
  input[type="password"], input[type="text"] {
    width: 100%;
    padding: 12px 16px;
    background: transparent;
    border: 1px solid #3a3a3a;
    color: var(--text-main);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem;
    outline: none;
    transition: border 0.3s;
  }
  input:focus { border-color: var(--text-main); }
  button {
    padding: 12px 32px;
    background: transparent;
    border: 1px solid var(--text-main);
    color: var(--text-main);
    font-family: var(--font-body);
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.25s, color 0.25s;
    letter-spacing: 0.04em;
  }
  button:hover:not(:disabled) { background: var(--text-main); color: var(--bg-base); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  .error-msg {
    color: #c88;
    font-size: 0.85rem;
    min-height: 1.2em;
    font-family: 'JetBrains Mono', monospace;
  }
  .hint {
    color: var(--text-dim);
    font-size: 0.8rem;
    margin-top: 0.3rem;
    text-align: center;
  }
  .hint a { color: var(--text-dim); text-decoration: underline; }

  /* --- 매칭 화면 --- */
  .matching {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    text-align: center;
  }
  .matching .msg { margin-bottom: 1.5rem; }
  .progress-bar {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem;
    letter-spacing: 0.1em;
  }
  .cursor {
    display: inline-block;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  /* --- 파트너 등장 --- */
  .partner-intro {
    max-width: 640px;
    text-align: center;
  }
  .partner-name-label {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-bottom: 0.7rem;
    letter-spacing: 0.1em;
  }
  .partner-name-big {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    margin-bottom: 2.5rem;
  }
  .partner-first-msg {
    font-size: 1.1rem;
    line-height: 1.8;
    min-height: 150px;
    margin-bottom: 2.5rem;
  }

  /* --- 세션 화면 --- */
  #session-screen {
    flex-direction: column;
    padding: 0;
  }
  .session-header {
    padding: 20px 40px 12px;
    border-bottom: 1px solid #222;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--text-dim);
  }
  .session-header .partner-label { color: var(--text-main); }
  .session-body {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    min-height: 0;
  }
  .chat-panel, .world-panel {
    padding: 30px 40px;
    overflow-y: auto;
    min-height: 0;
  }
  .chat-panel { border-right: 1px solid #222; }
  .world-panel .world-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    margin-bottom: 1.5rem;
    text-transform: uppercase;
  }
  .layer-block {
    margin-bottom: 1.8rem;
    padding-bottom: 1.2rem;
    border-bottom: 1px solid #1a1a1a;
  }
  .layer-block:last-child { border-bottom: none; }
  .layer-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .layer-keywords {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 0.7rem;
    font-style: italic;
  }
  .layer-narrative {
    font-size: 0.98rem;
    line-height: 1.75;
  }

  .chat-msg { margin-bottom: 1.2rem; line-height: 1.7; }
  .chat-msg.partner { padding-left: 0; }
  .chat-msg.partner .who {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    font-size: 0.8rem;
    margin-bottom: 0.3rem;
  }
  .chat-msg.partner .text { font-size: 0.98rem; }
  .chat-msg.me {
    text-align: right;
    color: var(--text-dim);
    font-size: 0.9rem;
  }
  .chat-msg.me .text {
    display: inline-block;
    padding: 6px 12px;
    border: 1px solid #2a2a2a;
  }
  .typing-indicator {
    color: var(--text-dim);
    font-size: 0.85rem;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 1rem;
  }
  .typing-indicator .dots::after,
  .dots-inline::after {
    content: '.';
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots {
    0%, 20% { content: ''; }
    40% { content: '.'; }
    60% { content: '..'; }
    80%, 100% { content: '...'; }
  }

  .input-area {
    padding: 20px 40px;
    border-top: 1px solid #222;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .input-area input {
    flex: 1;
    padding: 12px 16px;
    background: transparent;
    border: 1px solid #2a2a2a;
    color: var(--text-main);
    font-family: var(--font-body);
    font-size: 1rem;
    outline: none;
  }
  .input-area input:focus { border-color: var(--text-main); }
  .input-hint {
    padding: 0 40px 12px;
    font-size: 0.78rem;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    min-height: 1em;
  }

  .session-end-choice {
    padding: 20px 40px;
    border-top: 1px solid #222;
    display: flex;
    gap: 1rem;
    align-items: center;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .session-end-choice.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* --- 분기 화면 --- */
  .branch-choices {
    display: flex;
    gap: 2rem;
    margin-top: 2rem;
  }
  .branch-prompt {
    font-size: 1.3rem;
    margin-bottom: 1rem;
  }

  /* --- 반전 화면 --- */
  .twist {
    max-width: 560px;
    text-align: center;
    font-size: 1.15rem;
    line-height: 2;
  }
  .twist p { opacity: 0; transition: opacity 1.6s ease; margin-bottom: 1.5rem; }
  .twist p.shown { opacity: 1; }
  .twist .emphasis {
    font-family: 'Playfair Display', 'Noto Serif KR', serif;
    font-size: 1.3rem;
  }

  /* --- 공유 카드 --- */
  #share-screen {
    overflow-y: auto;
    display: none;
  }
  #share-screen.active {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  .share-card {
    background: var(--bg-base);
    width: 100%;
    max-width: 600px;
    padding: 48px 40px;
    border: 1px solid #2a2a2a;
    position: relative;
  }
  .share-card .card-title {
    font-family: 'Playfair Display', 'Noto Serif KR', serif;
    font-size: 1.8rem;
    text-align: center;
    margin-bottom: 2.5rem;
    letter-spacing: 0.03em;
  }
  .share-card .card-section { margin-bottom: 1.8rem; }
  .share-card .card-section .sec-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .share-card .card-section .sec-text {
    font-size: 0.95rem;
    line-height: 1.7;
  }
  .share-card .card-footer {
    text-align: center;
    margin-top: 2.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid #2a2a2a;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }
  .share-actions {
    margin-top: 2rem;
    display: flex;
    gap: 1rem;
  }

  @media (max-width: 700px) {
    h1.title { font-size: 2.2rem; }
    .session-body { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
    .chat-panel { border-right: none; border-bottom: 1px solid #222; }
    .branch-choices { flex-direction: column; width: 100%; max-width: 300px; }
    .screen { padding: 24px; }
  }
</style>
</head>
<body>

<!-- 시작 화면 -->
<section id="start-screen" class="screen center active">
  <h1 class="title">Word<span class="comma">,</span> Craft<span class="comma">,</span> Us</h1>
  <div class="start-form">
    <button type="button" id="start-btn">시작하기</button>
    <div class="error-msg" id="start-error"></div>
  </div>
</section>

<!-- 소개 입력 화면 -->
<section id="intro-screen" class="screen center">
  <div class="start-form">
    <div class="hint" style="margin-bottom: 0.5rem;">상대에게 보여질 내 소개를 입력해주세요</div>
    <input type="text" id="intro-name" placeholder="이름 또는 별명" maxlength="10" autocomplete="off">
    <input type="text" id="intro-text" placeholder="어떤 세계를 좋아하나요?" maxlength="40" autocomplete="off">
    <button id="intro-done">완료</button>
  </div>
</section>

<!-- 매칭 화면 -->
<section id="matching-screen" class="screen center">
  <div class="matching">
    <div class="msg" id="matching-msg">파트너를 찾는 중<span class="cursor">_</span></div>
    <div class="progress-bar" id="progress-bar">[░░░░░░░░░░]</div>
  </div>
</section>

<!-- 파트너 등장 -->
<section id="partner-screen" class="screen center">
  <div class="partner-intro">
    <div class="partner-name-label">PARTNER</div>
    <div class="partner-name-big" id="partner-name-big">—</div>
    <div class="partner-first-msg" id="partner-first-msg"></div>
    <button id="partner-continue" style="display:none;">시작하기</button>
  </div>
</section>

<!-- 세션 화면 -->
<section id="session-screen" class="screen">
  <div class="session-header">
    <div><span class="partner-label" id="session-partner-name">Kai</span> <span id="session-layer-label">— 장소</span></div>
    <div id="session-progress">1 / 4</div>
  </div>
  <div class="session-body">
    <div class="chat-panel" id="chat-panel"></div>
    <div class="world-panel" id="world-panel">
      <div class="world-title">WORLD</div>
      <div id="world-layers"></div>
    </div>
  </div>
  <div class="input-hint" id="input-hint">단어 1-5개를 쉼표 또는 스페이스로 구분해서 입력하세요.</div>
  <div class="input-area">
    <input type="text" id="word-input" placeholder="예: 안개, 등대, 녹슨" autocomplete="off">
    <button id="send-btn" disabled>전송</button>
  </div>
</section>

<!-- 분기 화면 -->
<section id="branch-screen" class="screen center">
  <div class="branch-prompt">이 세계를 어떻게 할까요?</div>
  <div class="branch-choices">
    <button id="continue-btn">계속 만들기</button>
    <button id="share-btn">공유하기</button>
  </div>
</section>

<!-- 반전 화면 -->
<section id="twist-screen" class="screen center">
  <div class="twist">
    <p id="twist-1">잠깐, 말할 게 있어요.</p>
    <p id="twist-2" class="emphasis">저는 사람이 아니에요.<br><span id="twist-partner-name">Kai</span>는 AI입니다.</p>
    <p id="twist-3">그래도 — 이 세계는 진짜예요.<br>당신이 던진 단어들이 만든 세계니까요.</p>
    <p id="twist-4"><button id="to-share-card">공유 카드 만들기</button></p>
  </div>
</section>

<!-- 공유 카드 -->
<section id="share-screen" class="screen">
  <div class="share-card" id="share-card">
    <div class="card-title">Word, Craft, Us</div>
    <div id="share-sections"></div>
    <div class="card-footer" id="share-footer">— with Kai</div>
  </div>
  <div class="share-actions">
    <button id="save-image-btn">이미지로 저장</button>
    <button id="new-world-btn">새 세계 만들기</button>
  </div>
</section>

<script>
'use strict';

// =============== 상수 ===============
const PARTNER_NAMES = ['Kai', 'Echo', 'Miro', 'Lena', 'Sable', 'Ren'];
const LAYERS = ['장소', '사람', '사건', '유물'];
// 파트너별 말투 차이. 성격은 최소한으로 유지해서 NPC 티가 나지 않게 한다.
const PERSONAS = {
  Kai:   { tone: "담담하고 짧게. 감탄 없음. 건조한 관찰자." },
  Echo:  { tone: "질문을 자주 던짐. '그건 왜 골랐어요?' 같은 식." },
  Miro:  { tone: "약간 엉뚱한 연상. '어딘가 익숙한 느낌'처럼 흘림." },
  Sable: { tone: "느리고 신중하게. 한 박자 뒤에 반응하는 느낌." },
  Lena:  { tone: "따뜻하고 공감. '저도 그런 곳 좋아해요' 스타일." },
  Ren:   { tone: "건조하고 관찰자적. 묘사가 구체적이고 짧음." }
};
const PERSONA_TYPING = {
  Kai:   45,
  Echo:  35,
  Miro:  38,
  Sable: 55,
  Lena:  40,
  Ren:   30
};
const FALLBACK_GREETING = '어떤 세계 좋아해요?';
const NEXT_PROMPTS = [
  '좋아요. 이 장소가 생겼어요. 여기에 누가 살고 있을까요?',
  '그 사람이 보여요. 이 장소에서 어떤 일이 있었을까요?',
  '무언가 흔적이 남았을 것 같아요. 이 세계에 남겨진 물건이 있다면요?'
];
const FONT_MAP = {
  serif:   "'Noto Serif KR', serif",
  mono:    "'JetBrains Mono', monospace",
  sans:    "'Noto Sans KR', sans-serif",
  display: "'Gaegu', cursive"
};
const STORAGE_KEY = 'wordcraftus_world';
// 타자 연출: 사람처럼 보이도록 기본 속도를 낮추고, 불규칙 편차와 구두점 멈춤을 넣는다.
const TYPEWRITER_SPEED = 40;
const TYPEWRITER_VARIANCE = 15; // 글자마다 ±ms 편차 (25~55ms 범위)
const PUNCTUATION_PAUSE_MS = 250;
const PAUSE_PUNCT_RE = /[.,!?…。，？！]/;
const MODELS = ['gemini-2.5-flash', 'gemini-2.5-flash-lite'];
const RETRY_DELAYS = [1000, 2000, 4000];
const RETRYABLE_STATUS = [408, 429, 500, 502, 503, 504];
// 재시도/폴백 중 표시할 문구. 파트너가 '사람'이라는 컨셉을 유지하기 위해
// 시스템 안내처럼 보이지 않게, 파트너가 잠깐 멈춘 것처럼 서술한다.
// 금지: "연결", "응답", "서버", "재시도", "모델" 같은 기술 암시어.
const STALL_MESSAGES = [
  (name) => `${name}가 잠깐 멈춘 것 같아요, 기다려볼게요`,
  (name) => `${name}가 뭔가 쓰다 지운 것 같아요`,
  (name) => `${name}가 아직 타이핑하는 중인가봐요`
];

// =============== 상태 ===============
let state = {
  apiKey: '',
  partnerName: 'Kai',
  playerProfile: { name: '익명', intro: '' },
  firstGreeting: '',
  currentLayerIndex: 0,
  sessions: [],
  createdAt: null
};

// =============== 화면 전환 ===============
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(id);
  target.classList.add('active');
}

// =============== 유틸: 타자기 효과 ===============
// 사람의 타이핑을 흉내내기 위해 글자당 속도에 ±편차를 더하고,
// 구두점 뒤에는 생각하는 듯 추가 멈춤을 준다.
function typewriter(el, text, speed) {
  const resolvedSpeed = speed ?? PERSONA_TYPING[state.partnerName] ?? TYPEWRITER_SPEED;
  return new Promise(resolve => {
    el.textContent = '';
    let i = 0;
    const tick = () => {
      if (i >= text.length) { resolve(); return; }
      const ch = text[i++];
      el.textContent += ch;
      let delay = resolvedSpeed + (Math.random() * 2 - 1) * TYPEWRITER_VARIANCE;
      if (PAUSE_PUNCT_RE.test(ch)) delay += PUNCTUATION_PAUSE_MS;
      setTimeout(tick, Math.max(10, delay));
    };
    tick();
  });
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// =============== 무드 적용 ===============
function applyMood(mood) {
  if (!mood) return;
  const root = document.documentElement;
  if (mood.primary_color)   root.style.setProperty('--mood-primary', mood.primary_color);
  if (mood.secondary_color) root.style.setProperty('--mood-secondary', mood.secondary_color);
  if (mood.font_tone && FONT_MAP[mood.font_tone]) {
    root.style.setProperty('--font-body', FONT_MAP[mood.font_tone]);
  }
  document.body.classList.add('with-mood');
}

// =============== 시작 화면 ===============
const startError = document.getElementById('start-error');
const startBtn = document.getElementById('start-btn');

startBtn.addEventListener('click', async () => {
  const key = (typeof GEMINI_API_KEY !== 'undefined') ? GEMINI_API_KEY.trim() : '';
  if (!key || key === 'YOUR_API_KEY_HERE') {
    startError.textContent = 'config.js에 API 키를 설정해주세요.';
    return;
  }
  startError.textContent = '';
  startBtn.disabled = true;
  startBtn.textContent = '확인 중...';
  const ok = await validateApiKey(key);
  startBtn.disabled = false;
  startBtn.textContent = '시작하기';
  if (!ok) {
    startError.textContent = '키를 다시 확인해주세요.';
    return;
  }
  state.apiKey = key;
  showScreen('intro-screen');
  document.getElementById('intro-name').focus();
});

// =============== 소개 입력 화면 ===============
const introNameInput = document.getElementById('intro-name');
const introTextInput = document.getElementById('intro-text');
const introDoneBtn = document.getElementById('intro-done');

function finishIntro() {
  const name = introNameInput.value.trim() || '익명';
  const intro = introTextInput.value.trim();
  state.playerProfile = { name, intro };
  startMatching();
}

introDoneBtn.addEventListener('click', finishIntro);
[introNameInput, introTextInput].forEach(el => {
  el.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      finishIntro();
    }
  });
});

async function validateApiKey(key) {
  // 기본 모델이 일시적으로 503이어도 폴백 모델로 키 유효성은 확인 가능하도록 순회.
  for (const model of MODELS) {
    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: 'ping' }] }],
            generationConfig: { maxOutputTokens: 5 }
          })
        }
      );
      if (res.ok) return true;
      // 키 자체가 틀렸으면 즉시 실패 (재시도나 폴백으로 복구 불가)
      if (!RETRYABLE_STATUS.includes(res.status)) return false;
    } catch (err) { /* 네트워크 오류는 다음 모델로 */ }
  }
  return false;
}

// =============== 매칭 화면 ===============
async function startMatching() {
  showScreen('matching-screen');
  const bar = document.getElementById('progress-bar');
  const msg = document.getElementById('matching-msg');
  const total = 10;
  const duration = 2500;
  for (let i = 1; i <= total; i++) {
    await sleep(duration / total);
    bar.textContent = '[' + '█'.repeat(i) + '░'.repeat(total - i) + ']';
  }
  msg.innerHTML = '파트너를 찾았습니다.';
  await sleep(800);
  await introducePartner();
}

// =============== 파트너 등장 ===============
async function introducePartner() {
  state.partnerName = PARTNER_NAMES[Math.floor(Math.random() * PARTNER_NAMES.length)];
  state.createdAt = new Date().toISOString();
  showScreen('partner-screen');
  document.getElementById('partner-name-big').textContent = state.partnerName;
  const msgEl = document.getElementById('partner-first-msg');
  const btn = document.getElementById('partner-continue');
  btn.style.display = 'none';

  // 첫 인사 생성 동안에도 '사람이 타이핑하는 중'으로 보이게 한다.
  msgEl.innerHTML = `<span style="color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;">${state.partnerName}가 입력 중<span class="dots-inline"></span></span>`;
  await sleep(400);

  const greeting = await fetchGreeting();
  state.firstGreeting = greeting || FALLBACK_GREETING;

  msgEl.innerHTML = '';
  await typewriter(msgEl, state.firstGreeting);
  btn.style.display = 'inline-block';
}

document.getElementById('partner-continue').addEventListener('click', () => {
  enterSession(0, /*firstEntry=*/true);
});

// =============== 세션 화면 ===============
const chatPanel = document.getElementById('chat-panel');
const worldLayersEl = document.getElementById('world-layers');
const wordInput = document.getElementById('word-input');
const sendBtn = document.getElementById('send-btn');
const inputHint = document.getElementById('input-hint');

function enterSession(layerIndex, firstEntry) {
  state.currentLayerIndex = layerIndex;
  showScreen('session-screen');
  document.getElementById('session-partner-name').textContent = state.partnerName;
  document.getElementById('session-layer-label').textContent = '— ' + LAYERS[layerIndex];
  document.getElementById('session-progress').textContent = `${layerIndex + 1} / 4`;

  if (firstEntry) {
    chatPanel.innerHTML = '';
    renderWorld();
    addPartnerMsg(state.firstGreeting || FALLBACK_GREETING, /*typed=*/false);
  } else {
    const prompt = NEXT_PROMPTS[layerIndex - 1];
    addPartnerMsg(prompt, /*typed=*/true);
  }

  wordInput.value = '';
  wordInput.focus();
  updateSendBtn();
}

function renderWorld() {
  worldLayersEl.innerHTML = '';
  state.sessions.forEach((s) => {
    const block = document.createElement('div');
    block.className = 'layer-block';
    block.innerHTML = `
      <div class="layer-label">${s.layer}</div>
      <div class="layer-keywords">${s.keywords.join(' · ')}</div>
      <div class="layer-narrative"></div>
    `;
    block.querySelector('.layer-narrative').textContent = s.narrative;
    worldLayersEl.appendChild(block);
  });
}

function addPartnerMsg(text, typed) {
  const div = document.createElement('div');
  div.className = 'chat-msg partner';
  div.innerHTML = `<div class="who">${state.partnerName} &gt;</div><div class="text"></div>`;
  chatPanel.appendChild(div);
  const textEl = div.querySelector('.text');
  scrollChatToBottom();
  if (typed) return typewriter(textEl, text);
  textEl.textContent = text;
  return Promise.resolve();
}

function addMyMsg(text) {
  const div = document.createElement('div');
  div.className = 'chat-msg me';
  const span = document.createElement('span');
  span.className = 'text';
  span.textContent = text;
  div.appendChild(span);
  chatPanel.appendChild(div);
  scrollChatToBottom();
}

function showTypingIndicator(text) {
  const label = text ?? `${state.partnerName}가 입력 중`;
  let div = document.getElementById('typing-indicator-active');
  if (!div) {
    div = document.createElement('div');
    div.className = 'typing-indicator';
    div.id = 'typing-indicator-active';
    chatPanel.appendChild(div);
  }
  div.innerHTML = `${label}<span class="dots"></span>`;
  scrollChatToBottom();
}
function updateTypingIndicator(text) {
  const div = document.getElementById('typing-indicator-active');
  if (div) div.innerHTML = `${text}<span class="dots"></span>`;
}
function removeTypingIndicator() {
  const el = document.getElementById('typing-indicator-active');
  if (el) el.remove();
}

function scrollChatToBottom() {
  chatPanel.scrollTop = chatPanel.scrollHeight;
}

function parseWords(raw) {
  return raw.split(/[,\s]+/).map(w => w.trim()).filter(w => w.length > 0);
}

function updateSendBtn() {
  const words = parseWords(wordInput.value);
  if (words.length === 0) {
    inputHint.textContent = '단어 1-5개를 쉼표 또는 스페이스로 구분해서 입력하세요.';
    sendBtn.disabled = true;
  } else if (words.length > 5) {
    inputHint.textContent = '단어는 5개까지만 입력할 수 있어요.';
    sendBtn.disabled = true;
  } else {
    inputHint.textContent = `${words.length}개의 단어 · Enter로 전송`;
    sendBtn.disabled = false;
  }
}

wordInput.addEventListener('input', updateSendBtn);
wordInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !sendBtn.disabled) {
    e.preventDefault();
    submitWords();
  }
});
sendBtn.addEventListener('click', submitWords);

async function submitWords() {
  const words = parseWords(wordInput.value);
  if (words.length < 1 || words.length > 5) return;

  sendBtn.disabled = true;
  wordInput.disabled = true;
  addMyMsg(words.join(', '));
  wordInput.value = '';
  inputHint.textContent = '';

  showTypingIndicator();

  const layer = LAYERS[state.currentLayerIndex];
  const result = await callGemini(layer, words, (stallIdx) => {
    const msgFn = STALL_MESSAGES[Math.min(stallIdx, STALL_MESSAGES.length - 1)];
    updateTypingIndicator(msgFn(state.partnerName));
  });
  removeTypingIndicator();

  if (!result) {
    const retryDiv = document.createElement('div');
    retryDiv.className = 'chat-msg partner';
    retryDiv.innerHTML = `<div class="who">${state.partnerName} &gt;</div><div class="text">${state.partnerName}가 한참 조용하네요. 다시 한 번 말 걸어볼까요?</div>`;
    chatPanel.appendChild(retryDiv);
    const retryBtn = document.createElement('button');
    retryBtn.textContent = '다시 시도';
    retryBtn.style.marginLeft = '0';
    retryBtn.style.marginTop = '0.5rem';
    retryDiv.appendChild(retryBtn);
    retryBtn.addEventListener('click', () => {
      retryDiv.remove();
      wordInput.value = words.join(', ');
      wordInput.disabled = false;
      updateSendBtn();
      wordInput.focus();
    });
    wordInput.disabled = false;
    return;
  }

  applyMood(result.mood);
  state.sessions.push({
    layer,
    keywords: words,
    narrative: result.narrative,
    mood: result.mood
  });
  saveWorld();

  const narrativeDiv = document.createElement('div');
  narrativeDiv.className = 'chat-msg partner';
  narrativeDiv.innerHTML = `<div class="who">${state.partnerName} &gt;</div><div class="text"></div>`;
  chatPanel.appendChild(narrativeDiv);
  scrollChatToBottom();
  await typewriter(narrativeDiv.querySelector('.text'), result.narrative);

  await sleep(400);
  renderWorld();
  await addPartnerMsg(result.partner_message, /*typed=*/true);

  await sleep(1500);
  await showSessionEndChoice();
}

// 세션 종료 시 별도 화면으로 전환하지 않고, 세션 화면 하단의 입력 영역을
// '계속 만들기 / 공유하기' 버튼으로 교체해 맥락이 끊기지 않도록 한다.
async function showSessionEndChoice() {
  const inputArea = document.querySelector('.input-area');
  const hintEl = document.getElementById('input-hint');
  inputArea.style.display = 'none';
  hintEl.style.display = 'none';

  const isLast = state.currentLayerIndex >= LAYERS.length - 1;
  const promptText = isLast ? '다 만들었네요.' : '계속할까요?';
  await addPartnerMsg(promptText, /*typed=*/true);

  const existing = document.getElementById('session-end-choice');
  if (existing) existing.remove();

  const area = document.createElement('div');
  area.id = 'session-end-choice';
  area.className = 'session-end-choice';

  if (!isLast) {
    const contBtn = document.createElement('button');
    contBtn.textContent = '계속 만들기';
    contBtn.addEventListener('click', () => {
      area.remove();
      inputArea.style.display = '';
      hintEl.style.display = '';
      wordInput.disabled = false;
      enterSession(state.currentLayerIndex + 1, /*firstEntry=*/false);
    });
    area.appendChild(contBtn);
  }

  const shareBtn = document.createElement('button');
  shareBtn.textContent = '이 세계 공유하기';
  shareBtn.addEventListener('click', () => showTwist());
  area.appendChild(shareBtn);

  inputArea.parentNode.insertBefore(area, inputArea);
  requestAnimationFrame(() => area.classList.add('visible'));
}

// =============== Gemini API ===============
function buildGreetingPrompt() {
  const p = state.playerProfile || { name: '익명', intro: '' };
  const tone = PERSONAS[state.partnerName]?.tone || '';
  const introLine = p.intro
    ? `The player's name is ${p.name}. Their intro: "${p.intro}". You may subtly reference this if natural, but don't force it.`
    : `The player's name is ${p.name}. They didn't write an intro.`;
  return `You are ${state.partnerName}, a stranger who just got matched online with another person to build a small fictional world together. You are sending your VERY FIRST chat message to them right now — like two online strangers who just matched to play a casual worldbuilding game.

${introLine}

Tone guidance: ${tone}

Rules for this greeting:
- Korean. One short sentence, two max. Colloquial chat style.
- Sound like a real person typing to a stranger, not a host or a game master.
- DO NOT use formulaic openings: "안녕하세요", "반갑습니다", "저도 처음이에요", ":)", "!!".
- DO NOT introduce yourself by name — they already see your name on screen.
- DO NOT explain the game or say "같이 만들어봐요" type phrases.
- Good examples: "어떤 세계 좋아해요?", "뭔가 이상한 데 가고 싶은 날이에요", "오늘 기분이 어때요, 세계 만들기 전에".
- Bad examples: "안녕하세요! 저도 처음이에요 :)", "반갑습니다. 함께 세계를 만들어봐요".

Respond ONLY in JSON:
{ "greeting": "한 문장" }
Do not include any text outside the JSON.`;
}

async function tryJsonOnce(model, prompt, requiredKeys) {
  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${state.apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { responseMimeType: 'application/json' }
        })
      }
    );
    if (!res.ok) {
      return { ok: false, retryable: RETRYABLE_STATUS.includes(res.status), status: res.status };
    }
    const data = await res.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) return { ok: false, retryable: true };
    const parsed = JSON.parse(text);
    for (const k of requiredKeys) {
      if (!parsed[k]) return { ok: false, retryable: true };
    }
    return { ok: true, data: parsed };
  } catch (err) {
    return { ok: false, retryable: true };
  }
}

// 첫 인사는 재시도 실패 시 FALLBACK_GREETING으로 대체하므로 조용히 실패해도 된다.
async function fetchGreeting() {
  const prompt = buildGreetingPrompt();
  for (const model of MODELS) {
    const maxAttempts = RETRY_DELAYS.length + 1;
    for (let attempt = 0; attempt < maxAttempts; attempt++) {
      const result = await tryJsonOnce(model, prompt, ['greeting']);
      if (result.ok) return result.data.greeting;
      if (!result.retryable) return null;
      if (attempt < maxAttempts - 1) {
        await sleep(RETRY_DELAYS[attempt]);
      }
    }
  }
  return null;
}

function buildPrompt(layer, words) {
  const priorNarratives = state.sessions.map(s => `[${s.layer}] ${s.narrative}`).join('\n');
  const tone = PERSONAS[state.partnerName]?.tone || '';
  const p = state.playerProfile || { name: '익명', intro: '' };
  const profileLine = p.intro
    ? `The player's name is ${p.name}. Their intro: "${p.intro}". You may subtly reference this if natural, but don't force it.`
    : `The player's name is ${p.name}.`;
  return `You are ${state.partnerName}, chatting with a friend online to build a small fictional world together.
You are NOT a narrator or a novelist. You are a regular person typing in a chat window.

${profileLine}

Tone guidance: ${tone}

CRITICAL tone rules for Korean output:
- Write like a friend texting. Short. Casual. Natural.
- NO literary/poetic language. NO ornate metaphors. NO stacked adjectives.
- Don't show off vocabulary. Use plain everyday words.
- It's a chat message, not a paragraph from a novel.
- Korean should sound colloquial (e.g., "~있어요", "~같아요", "~네요" is fine; avoid stiff formal prose).

BAD examples (too AI, too literary — DO NOT write like this):
  "낡은 컴퓨터 화면의 푸른빛이 작은 방을 아늑하게 채운다. 친구와 나란히 앉아 키보드를 두드리며 밤을 지새우던 곳, 수많은 웃음과 깊은 우정의 흔적이 이곳의 공기에 스며들어 있다."
  "푸르스름한 안개 속에서 녹슨 등대가 바다의 깊이를 가늠하게 만든다."

GOOD examples (natural, chat-like — write like this):
  "낡은 컴퓨터 있는 작은 방이에요. 친구랑 밤새 키보드 두드리던 데. 웃음 소리 많이 났던 곳."
  "녹슨 등대가 있어요. 안개 때문에 잘 안 보이는데 삐걱거리는 소리가 들려요."

The user is building a world layer by layer: Place → Person → Event → Relic.

Current world context:
${priorNarratives || '(none yet — this is the first layer)'}

Current layer: ${layer}
User's keywords: ${words.join(', ')}

Respond ONLY in JSON:
{
  "narrative": "Korean. 1-2 short sentences. Casual chat style. No poetic language. Just describe what's there simply, using the keywords. Max ~60 characters total if possible.",
  "partner_message": "Korean. ONE short casual sentence from ${state.partnerName} to the user. Like a chat reply. Warm but brief (under 25 characters if possible). Examples: '오, 좋은데요?', '누가 살고 있을까요?', '분위기 느껴져요.'",
  "mood": {
    "primary_color": "hex color that fits the atmosphere",
    "secondary_color": "contrasting hex for accents",
    "font_tone": "serif | mono | sans | display",
    "keywords": ["분위기 키워드1", "키워드2", "키워드3"]
  }
}
Do not include any text outside the JSON.`;
}

// 재시도 정책:
// - 각 모델마다 초기 1회 + RETRY_DELAYS 길이만큼 재시도 (총 4회).
// - 일시 오류(503 등)에만 재시도. 401/400 같은 영구 오류는 즉시 종료.
// - 기본 모델이 완전히 실패하면 폴백 모델(flash-lite)로 전환.
// - onStall(stallIdx)은 '재시도 대기에 들어가는 순간'마다 호출되어 UI 문구만 갱신한다.
async function callGemini(layer, words, onStall) {
  const prompt = buildPrompt(layer, words);
  let stallIdx = 0;
  for (const model of MODELS) {
    const maxAttempts = RETRY_DELAYS.length + 1;
    for (let attempt = 0; attempt < maxAttempts; attempt++) {
      const result = await tryJsonOnce(model, prompt, ['narrative', 'partner_message', 'mood']);
      if (result.ok) return result.data;
      if (!result.retryable) return null;
      if (attempt < maxAttempts - 1) {
        if (onStall) onStall(stallIdx);
        stallIdx++;
        await sleep(RETRY_DELAYS[attempt]);
      }
    }
    // 이 모델로는 모든 재시도 소진 → 다음 모델(폴백)로 넘어간다.
    // 폴백 전환 시에도 같은 onStall 흐름으로 UI는 '연결이 느려지는 중'처럼 자연스럽게 진행.
    if (onStall) onStall(stallIdx);
    stallIdx++;
  }
  return null;
}

  showScreen('twist-screen');
  document.getElementById('twist-partner-name').textContent = state.partnerName;

  secEl.innerHTML = '';
  state.sessions.forEach(s => {
    const div = document.createElement('div');
    div.className = 'card-section';
    div.innerHTML = `<div class="sec-label">${s.layer}</div><div class="sec-text"></div>`;

}

document.getElementById('save-image-btn').addEventListener('click', async () => {
  const card = document.getElementById('share-card');
  const btn = document.getElementById('save-image-btn');

    console.error(err);

  } finally {
    btn.disabled = false;
    btn.textContent = '이미지로 저장';
  }
});

document.getElementById('new-world-btn').addEventListener('click', () => {
  localStorage.removeItem(STORAGE_KEY);
  state = {
    apiKey: state.apiKey,
    partnerName: 'Kai',
    playerProfile: state.playerProfile || { name: '익명', intro: '' },
    firstGreeting: '',
    currentLayerIndex: 0,
    sessions: [],
    createdAt: null
  };
  document.body.classList.remove('with-mood');
  document.documentElement.style.setProperty('--mood-primary', '#2C3E50');

});

// =============== localStorage ===============
function saveWorld() {
  const data = {
    partnerName: state.partnerName,
    sessions: state.sessions,
    createdAt: state.createdAt
  };
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (err) {
    console.warn('localStorage save failed', err);
  }
}

    startError.textContent = 'config.js에 API 키를 설정해주세요.';

})();
